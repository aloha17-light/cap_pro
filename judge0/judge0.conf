# =============================================================================
# Judge0 CE Configuration
# =============================================================================
# These values are loaded by docker-compose.yml via the x-judge0-env anchor.
# This file serves as documentation and can optionally be mounted into the
# Judge0 container if you switch to a file-based config approach.
# =============================================================================

# -- Database --
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_secret

# -- Redis --
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=redis_secret

# -- Execution Limits --
# Max CPU time per submission (seconds)
CPU_TIME_LIMIT=5
# Max extra CPU time (seconds)
CPU_EXTRA_TIME=1
# Max wall clock time (seconds)
WALL_TIME_LIMIT=10
# Max memory per submission (KB) — 256 MB
MEMORY_LIMIT=262144
# Max stack size (KB) — 128 MB
STACK_LIMIT=131072
# Max output size (KB) — 1 MB
MAX_FILE_SIZE=1024
# Max number of processes
MAX_PROCESSES_AND_OR_THREADS=60

# -- Features --
ENABLE_WAIT_RESULT=true
ENABLE_COMPILER_OPTIONS=true
ALLOWED_LANGUAGES_FOR_COMPILE_OPTIONS=all
